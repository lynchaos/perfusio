name: perfusio
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python>=3.11,<3.14
  - pip>=24.0
  # PyTorch (CPU build; remove cpuonly for GPU)
  - pytorch>=2.2
  - cpuonly
  # Scientific stack
  - numpy>=1.26
  - scipy>=1.12
  - pandas>=2.2
  - pyarrow>=15.0
  # Visualisation
  - matplotlib>=3.8
  - plotly>=5.20
  # Build and package management
  - pip:
    - perfusio[dev,docs]
    - gpytorch>=1.11
    - botorch>=0.10
    - linear_operator>=0.5
    - pydantic>=2.6
    - pydantic-settings>=2.2
    - dash>=2.16
    - dash-bootstrap-components>=1.5
    - cmocean>=4.0
    - asyncua>=1.1
    - sqlalchemy>=2.0
    - alembic>=1.13
    - openpyxl>=3.1
    - typer>=0.12
    - rich>=13.7
    - tqdm>=4.66
    - humanize>=4.9
    - structlog>=24.1
    - tenacity>=8.2
    - cryptography>=42.0
    - pytest>=8.1
    - pytest-cov>=5.0
    - pytest-xdist>=3.5
    - pytest-asyncio>=0.23
    - pytest-mock>=3.14
    - pytest-mpl>=0.17
    - pytest-benchmark>=4.0
    - hypothesis>=6.100
    - mypy>=1.9
    - pyright>=1.1.360
    - ruff>=0.4
    - pre-commit>=3.7
    - jupytext>=1.16
    - ipykernel>=6.29
    - sphinx>=7.3
    - myst-parser>=3.0
    - sphinx-autodoc2>=0.5
    - myst-nb>=1.1
    - pydata-sphinx-theme>=0.15
    - sphinxcontrib-bibtex>=2.6
    - sphinx-copybutton>=0.5
